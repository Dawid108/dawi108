<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rewolucje w Rosji</title>
<script src="script.js"></script>
<link rel="icon" href="dawi108.png" type="image/png">
<style>
body{
background:#0d102b;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}
#game, #endScreen{
width:90%; max-width:500px;
background:#13173d;
padding:20px;
border-radius:20px;
text-align:center;
box-shadow:0 0 20px #0006;
}
.category{font-size:18px;margin-bottom:10px;color:#7dd7ff;}
.question{font-size:20px;margin-bottom:20px;}
.btn{background:#1c2257;padding:12px;border-radius:10px;margin:10px 0;cursor:pointer;transition:.2s;}
.btn:hover{background:#27307a;}
.correct{background:#1fa84f !important;}
.wrong{background:#c62828 !important;}
#stats{display:flex;justify-content:space-between;margin-bottom:20px;color:#9bbcff;}
#counter{margin-top:10px;color:#9bbcff;}
.hidden{display:none;}
#endScreen button{margin-top:15px;background:#6f85ff;padding:10px 20px;border:none;border-radius:10px;color:white;font-size:18px;cursor:pointer;}
</style>
</head>
<body>

<div id="game">
    <div id="stats">
        <div>Życia: <span id="life">9</span></div>
        <div>Punkty: <span id="score">0</span></div>
    </div>
    <div class="category" id="category"></div>
    <div class="question" id="question"></div>
    <div id="answers"></div>
    <div id="counter"></div>
</div>

<div id="endScreen" class="hidden">
    <h2 id="endTitle"></h2>
    <p>Twój wynik: <span id="finalScore"></span></p>
    <p>Twój rekord: <span id="record"></span></p>
    <p>Suma punktów: <span id="dawid108"></span></p>
    <button onclick="newGame()">Nowa Gra</button>
</div>

<script>
// PYTANIA
let questions = [

{cat:"Rewolucje w Rosji", q:"Co doprowadziło do załamania politycznego i gospodarczego Rosji podczas I wojny światowej?", a:"Porażki ponoszone przez armię rosyjską", b:"Zwycięstwa armii rosyjskiej nad Niemcami", c:"Rozwój przemysłu i handlu w Rosji", d:"Sojusz militarny Rosji z Japonią"},

{cat:"Rewolucje w Rosji", q:"W którym miesiącu 1917 roku doszło do demonstracji zwanych rewolucją lutową?", a:"W marcu 1917 roku", b:"W styczniu 1917 roku", c:"W czerwcu 1917 roku", d:"We wrześniu 1917 roku"},

{cat:"Rewolucje w Rosji", q:"Jak nazywały się protesty, które doprowadziły do obalenia caratu w 1917 roku?", a:"Rewolucja lutowa", b:"Powstanie listopadowe", c:"Rewolucja grudniowa", d:"Bunt dekabrystów"},

{cat:"Rewolucje w Rosji", q:"Który car abdykował w wyniku rewolucji lutowej?", a:"Mikołaj II", b:"Aleksander II", c:"Piotr I", d:"Aleksander III"},

{cat:"Rewolucje w Rosji", q:"Jaki organ władzy przejął rządy po abdykacji cara?", a:"Rząd Tymczasowy", b:"Rada Państwa", c:"Komitet Wojskowy", d:"Rada Ministrów"},

{cat:"Rewolucje w Rosji", q:"Ile ośrodków władzy powstało w Rosji po obaleniu caratu?", a:"Dwa ośrodki władzy", b:"Trzy ośrodki władzy", c:"Cztery ośrodki władzy", d:"Pięć ośrodków władzy"},

{cat:"Rewolucje w Rosji", q:"Jak nazywał się organ reprezentujący radę delegatów robotniczych i żołnierskich?", a:"Tymczasowy Komitet Wykonawczy", b:"Komitet Narodowy Rosji", c:"Centralna Rada Robotników", d:"Związek Delegatów Ludowych"},

{cat:"Rewolucje w Rosji", q:"Jak nazywało się zbrojne przejęcie władzy przez bolszewików w 1917 roku?", a:"Rewolucja październikowa", b:"Rewolucja marcowa", c:"Rewolucja grudniowa", d:"Powstanie moskiewskie"},

{cat:"Rewolucje w Rosji", q:"Kto był przywódcą bolszewików podczas rewolucji październikowej?", a:"Włodzimierz Lenin", b:"Lew Trocki", c:"Józef Stalin", d:"Nikita Chruszczow"},

{cat:"Rewolucje w Rosji", q:"W którym miesiącu 1917 roku bolszewicy przejęli władzę według kalendarza gregoriańskiego?", a:"W listopadzie 1917 roku", b:"W sierpniu 1917 roku", c:"W maju 1917 roku", d:"W lutym 1917 roku"},

{cat:"Rewolucje w Rosji", q:"Jaki rząd został obalony w wyniku rewolucji październikowej?", a:"Rząd Tymczasowy", b:"Rząd carski", c:"Rząd wojskowy", d:"Rząd parlamentarny"},

{cat:"Rewolucje w Rosji", q:"Jaki system rządów wprowadzili bolszewicy po przejęciu władzy?", a:"Rządy komunistyczne w Rosji", b:"Monarchię konstytucyjną w Rosji", c:"Demokrację parlamentarną w Rosji", d:"Republikę federacyjną w Rosji"},

{cat:"Rewolucje w Rosji", q:"Z jakiej wojny wycofała się Rosja po przejęciu władzy przez bolszewików?", a:"Z I wojny światowej", b:"Z wojny rosyjsko-japońskiej", c:"Z wojny krymskiej", d:"Z wojny bałkańskiej"},

{cat:"Rewolucje w Rosji", q:"Jak nazywano zwolenników rewolucji podczas wojny domowej w Rosji?", a:"Czerwoni", b:"Zieloni", c:"Czarni", d:"Żółci"},

{cat:"Rewolucje w Rosji", q:"Jak nazywano przeciwników rewolucji podczas wojny domowej?", a:"Biali", b:"Czarni", c:"Niebiescy", d:"Zieloni"},

{cat:"Rewolucje w Rosji", q:"Jak nazywał się system władzy wprowadzony przez bolszewików po wojnie domowej?", a:"Dyktatura proletariatu", b:"Republika parlamentarna", c:"Monarchia konstytucyjna", d:"Federacja narodów"},

{cat:"Rewolucje w Rosji", q:"Jak nazywała się pierwsza tajna policja bolszewików?", a:"Czeka", b:"Gestapo", c:"Ochrania", d:"Abwehra"},

{cat:"Rewolucje w Rosji", q:"Jak nazywała się późniejsza nazwa organizacji Czeka?", a:"NKWD", b:"KGB", c:"GRU", d:"SB"},

{cat:"Rewolucje w Rosji", q:"Kto stał na czele tajnej policji bolszewickiej?", a:"Feliks Dzierżyński", b:"Józef Stalin", c:"Lew Trocki", d:"Michaił Kalinin"},

{cat:"Rewolucje w Rosji", q:"Jakim państwem stała się Rosja po zwycięstwie bolszewików?", a:"Państwem totalitarnym", b:"Państwem demokratycznym", c:"Państwem federacyjnym", d:"Państwem liberalnym"},

{cat:"Rewolucje w Rosji", q:"Co stało się z większością swobód obywatelskich w Rosji bolszewickiej?", a:"Zostały zniesione", b:"Zostały rozszerzone", c:"Zostały częściowo ograniczone", d:"Zostały zagwarantowane"},

{cat:"Rewolucje w Rosji", q:"Co zrobiono z majątkami prywatnymi po zwycięstwie bolszewików?", a:"Zostały znacjonalizowane", b:"Zostały sprzedane za granicę", c:"Zostały oddane arystokracji", d:"Zostały przekazane bankom"},

{cat:"Rewolucje w Rosji", q:"Co stało się z partiami politycznymi w Rosji bolszewickiej?", a:"Zostały zdelegalizowane", b:"Zostały połączone w jedną", c:"Zostały wzmocnione ustawą", d:"Zostały przeniesione do armii"},

{cat:"Rewolucje w Rosji", q:"W którym miesiącu 1918 roku rozstrzelano rodzinę carską?", a:"W lipcu 1918 roku", b:"W styczniu 1918 roku", c:"We wrześniu 1918 roku", d:"W listopadzie 1918 roku"}

];

let current = 0;
let life = 9;
let score = 0;
let used = [];
let maxQ = questions.length;
let record = localStorage.getItem("szkola") || 0;
let dawid108 = localStorage.getItem("dawid108") || 0;

function newGame(){
    life = 9; score = 0; used = [];
    document.getElementById("endScreen").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");
    updateStats();
    nextQuestion();
}

function updateStats(){
    document.getElementById("life").innerText = life;
    document.getElementById("score").innerText = score;
}

function nextQuestion(){
    if(used.length === maxQ){ return win(); }

    let id;
    do{ id = Math.floor(Math.random()*maxQ); }
    while(used.includes(id));

    used.push(id);
    current = questions[id];

    document.getElementById("category").innerText = current.cat;
    document.getElementById("question").innerText = current.q;

    document.getElementById("counter").innerText = "Pytanie " + used.length + " / " + maxQ;

    // Mieszanie odpowiedzi
    let arr = [
        {txt: current.a, correct: true},
        {txt: current.b, correct: false},
        {txt: current.c, correct: false},
        {txt: current.d, correct: false}
    ];
    arr.sort(()=>Math.random()-0.5);

    let ansDiv = document.getElementById("answers");
    ansDiv.innerHTML = "";

    arr.forEach(a=>{
        let btn = document.createElement("div");
        btn.classList.add("btn");
        btn.innerText = a.txt;
        btn.onclick = ()=>answer(a.correct, btn);
        ansDiv.appendChild(btn);
    });
}

function answer(correct, btn){
    let buttons = document.querySelectorAll(".btn");
    buttons.forEach(b=>b.style.pointerEvents="none");

    if(correct){
        btn.classList.add("correct");
        score++;
        dawid108++;
        localStorage.setItem("dawid108", dawid108);
        console.log("dawid108:", dawid108);
        updateStats();
        setTimeout(()=>nextQuestion(), 1500);
    }else{
        btn.classList.add("wrong");
        // pokaż poprawną
        buttons.forEach(b=>{
            if(b.innerText === current.a) b.classList.add("correct");
        });
        life--;
        updateStats();
        if(life <= 0){ setTimeout(()=>gameOver(), 6000); }
        else{ setTimeout(()=>nextQuestion(), 5000); }
    }
}

function win(){
    document.getElementById("game").classList.add("hidden");
    document.getElementById("endScreen").classList.remove("hidden");
    document.getElementById("endTitle").innerText = "Wygrałeś!";
    endScreen();
}

function gameOver(){
    document.getElementById("game").classList.add("hidden");
    document.getElementById("endScreen").classList.remove("hidden");
    document.getElementById("endTitle").innerText = "Koniec gry";
    endScreen();
}

function endScreen(){
    document.getElementById("finalScore").innerText = score;

    if(score > record){
        record = score;
        localStorage.setItem("szkola", record);
    }

    document.getElementById("record").innerText = record;
    document.getElementById("dawid108").innerText = dawid108;
}

newGame();
</script>
</body>
</html>
