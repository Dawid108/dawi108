<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Długopole Zdrój</title>
    <script src="script.js"></script>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --accent: #81c784;
            --text: #ffffff;
            --text-dim: #b0b0b0;
            --blue: #64b5f6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            line-height: 1.5;
        }

        header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 20px;
        }

        h1 { color: var(--accent); margin: 0; font-size: 1.8rem; }
        
        #stats {
            background: var(--accent);
            color: #000;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        .section {
            background: var(--card);
            border-radius: 12px;
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .section h2 {
            background: #252525;
            margin: 0;
            padding: 12px 15px;
            font-size: 1.1rem;
            color: var(--accent);
            border-bottom: 1px solid #333;
        }

        .item {
            display: flex;
            align-items: flex-start;
            padding: 12px 15px;
            border-bottom: 1px solid #2a2a2a;
        }

        .item:last-child { border-bottom: none; }

        .checkbox-box {
            margin-top: 3px;
            margin-right: 12px;
        }

        input[type="checkbox"] {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: var(--accent);
        }

        .details { flex: 1; }
        .details strong { display: block; font-size: 1rem; }
        .details span { font-size: 0.85rem; color: var(--text-dim); }

        .links { margin-top: 5px; }
        .links a {
            color: var(--blue);
            text-decoration: none;
            font-size: 0.85rem;
            margin-right: 12px;
        }

        .done {
            opacity: 0.4;
            text-decoration: line-through;
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>🌲 Dlugopole Zdrój</h1>
    <div id="stats">Wczytywanie...</div>
</header>

<div id="app"></div>

<script>
    const data = [
        {
            title: "Książeczki i Odznaki",
            items: [
                { name: "Korona Gór Bystrzyckich PTTK", info: "PTTK", book: "https://dawid108.github.io/ksiazeczki/korona-gor-bystrzyckich.html", map: "https://maps.app.goo.gl/PJNEHzDrU8XBFmsy5" },
                { name: "Korona Gór Bystrzyckich KZKG RP", info: "KZKG RP", book: "https://dawid108.github.io/ksiazeczki/korona-gor-bystrzyckich-kzkg-rp.html", map: "https://maps.app.goo.gl/skBscarvBk93zR248" },
                { name: "Korona Gór Bardzkich KZKG RP", info: "KZKG RP", book: "https://dawid108.github.io/ksiazeczki/korona-gor-bardzkich.html", map: "https://maps.app.goo.gl/fmH472rYDRy4yutG6" },
                { name: "Znam Góry Bardzkie", info: "Bardzkie", book: "https://dawid108.github.io/ksiazeczki/znam-gory-bardzkie.html", map: "https://maps.app.goo.gl/inGACxgPBUJsHGJu9" },
                { name: "Korona Gór Orlickich", info: "Orlickie", book: "https://dawid108.github.io/ksiazeczki/korona-gor-orlickich.html", map: "https://maps.app.goo.gl/mWK9wEfT7ojYf5Sb7" },
                { name: "Korona Masywu Śnieżnika PTTK", info: "Śnieżnik", book: "korona-masywu-snieznika.html", map: "https://maps.app.goo.gl/byHPTz3Pv9YUAyK39" },
                { name: "Przyjaciel Międzygórza", info: "Międzygórze", book: "https://dawid108.github.io/ksiazeczki/przyjaciel-miedzygorza.html", map: "https://maps.app.goo.gl/LNDcZrfwu2rUqEFc6" },
                { name: "Korona Sudetów Polskich", info: "Sudety", book: "https://dawid108.github.io/ksiazeczki/korona-sudetow-polskich.html", map: "https://maps.app.goo.gl/4uUi9DugQ54y7Z7o8" },
                { name: "Sudeckie Schroniska", info: "Schroniska", book: "https://dawid108.github.io/ksiazeczki/sudeckie-schroniska.html", map: "https://maps.app.goo.gl/AYa6AWxriPwZ6rDW6" },
                { name: "Korona Widoków Polskich", info: "Widoki", book: "https://dawid108.github.io/ksiazeczki/korona-widokow-polskich-gory.html", map: "https://maps.app.goo.gl/BDUqoNi6njp4TYmj6" },
                { name: "Wieże Widokowe Sudetów", info: "Wieże", book: "https://dawid108.github.io/ksiazeczki/wieze-widokowe-gor-i-pogorzy-sudety.html", map: "https://maps.app.goo.gl/cxUUJhSzeprMesYY6" }
            ]
        },
        {
            title: "Góry Bardzkie",
            items: [
                { name: "Brzeźnica (493 m)", info: "41 min / 2,4 km", map: "https://mapy.com/s/jezuvucepo" },
                { name: "Wilczak (633 m)", info: "24 min / 840 m", map: "https://mapy.com/s/nafubanuto" },
                { name: "Obszerna (573 m)", info: "44 min / 2,8 km", map: "https://mapy.com/s/jokafamazu" },
                { name: "Grochowska Góra (432 m)", info: "21 min / 1,2 km", map: "https://mapy.com/s/dedumamode" }
            ]
        },
        {
            title: "Góry Bystrzyckie",
            items: [
                { name: "Trasa 9 szczytów", info: "9:08 g / 36,8 km", map: "https://mapy.com/s/kepanocomo" },
                { name: "Zamkowa Kopa (784 m)", info: "49 min / 3,3 km", map: "https://mapy.com/s/pacakobege" },
                { name: "Jedlnik (746 m)", info: "7 min / 567 m", map: "https://mapy.com/s/helosohame" },
                { name: "Dębowiec (666 m)", info: "20 min / 1,5 km", map: "https://mapy.com/s/nucovoteno" },
                { name: "Bochniak (713 m)", info: "35 min / 2,4 km", map: "https://mapy.com/s/bebapagane" }
            ]
        },
        {
            title: "Masyw Śnieżnika",
            items: [
                { name: "Sikornik (550 m)", info: "4 s / 8 m", map: "https://mapy.com/s/gepurogute" },
                { name: "Opacz (741 m)", info: "1:07 g / 3,7 km", map: "https://mapy.com/s/kurecoguke" },
                { name: "Krzyżowa (500 m)", info: "53 min / 3,1 km", map: "https://mapy.com/s/gepovacapo" },
                { name: "Sędzisz (489 m)", info: "30 min / 1,7 km", map: "https://mapy.com/s/netusebasa" }
            ]
        },
        {
            title: "Atrakcje i Trasy",
            items: [
                { name: "Wieża Żelazno", info: "Atrakcja", map: "https://maps.app.goo.gl/9GDFCJUxkUHWZaYo7" },
                { name: "Góra Parkowa Bystrzyca Kłodzka", info: "Atrakcja", map: "https://maps.app.goo.gl/h3HQwYrdphmE5bn17" },
                { name: "Trasa Piątek (10.04.2026)", info: "Samochód", map: "https://maps.app.goo.gl/UyN5hE1KrvhrBBqM7" },
                { name: "Trasa Sobota", info: "Samochód", map: "https://maps.app.goo.gl/unuhN4VL1ruhCGAe9" }
            ]
        }
    ];

    const app = document.getElementById('app');
    const stats = document.getElementById('stats');
    let db = JSON.parse(localStorage.getItem('dlugopole_v1')) || {};

    window.toggleItem = function(id) {
        const checkbox = document.getElementById(id);
        const textElement = document.getElementById('box-' + id);
        
        db[id] = checkbox.checked;
        
        if (db[id]) textElement.classList.add('done');
        else textElement.classList.remove('done');
        
        localStorage.setItem('dlugopole_v1', JSON.stringify(db));
        updateStats();
    };

    function updateStats() {
        let total = 0;
        data.forEach(s => total += s.items.length);
        const done = Object.values(db).filter(x => x === true).length;
        stats.innerText = `Zdobyto: ${done} / ${total}`;
    }

    function init() {
        let html = '';
        data.forEach(section => {
            html += `<div class="section"><h2>${section.title}</h2>`;
            section.items.forEach(item => {
                const id = btoa(encodeURIComponent(item.name)).replace(/=/g, '').substring(0, 12);
                const isChecked = db[id] ? 'checked' : '';
                const doneClass = db[id] ? 'done' : '';
                
                html += `
                    <div class="item">
                        <div class="checkbox-box">
                            <input type="checkbox" id="${id}" ${isChecked} onchange="toggleItem('${id}')">
                        </div>
                        <div class="details ${doneClass}" id="box-${id}">
                            <strong>${item.name}</strong>
                            <span>${item.info}</span>
                            <div class="links">
                                <a href="${item.map}" target="_blank">📍 Mapa</a>
                                ${item.book ? `<a href="${item.book}" target="_blank">📖 Odznaka</a>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            });
            html += `</div>`;
        });
        app.innerHTML = html;
        updateStats();
    }

    // Run app
    init();
</script>

</body>
</html>
