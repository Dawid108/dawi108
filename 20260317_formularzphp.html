<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Formularz w PHP</title>
    <script src="script.js"></script>
    <link rel="icon" href="dawi108.png">
</head>
<body>
    <h1>Twoje ulubione książki</h1>
    <form action="20260317_formularzphp.php" method="POST">
        Podaj swoje imię: <input type="text" name="imie"><br>
        Ile masz lat: <input type="number" name="wiek" min="1"><br>
        Wybierz ulubione kategorie książek: <br>
        <label><input type="checkbox" name="kategoria[]" value="przygodowe">przygodowe</label><br>
        <label><input type="checkbox" name="kategoria[]" value="kryminały">kryminały</label><br>
        <label><input type="checkbox" name="kategoria[]" value="sci-fi">sci-fi</label><br>
        <label><input type="checkbox" name="kategoria[]" value="historyczne">historyczne</label><br>
        <label><input type="checkbox" name="kategoria[]" value="autobiografie">autobiografie</label><br>
        Podaj ulubionego autora i ulubiony tytuł:<br>
        <textarea rows="2" cols="80" name="ulubione">Moin ulubionym autorem jest ...</textarea><br>
        <fieldset>
            <legend>Ile książek tego autora przeczytałeś?</legend>
            <label><input type="radio" name="liczba" value="1">1</label><br>
            <label><input type="radio" name="liczba" value="od 2 do 5">od 2 do 5</label><br>
            <label><input type="radio" name="liczba" value="od 6 do 10">od 6 do 10</label><br>
            <label><input type="radio" name="liczba" value="powyżej 10">powyżej 10</label><br>
        </fieldset><br>
        Skąd pochodzą Twoje książki?<br>
        <select name="pochodzenie[]" multiple>
            <option value="kupuję w księgarni">kupuję w księgarni</option>
            <option value="wypożyczam w bibliotece">wypożyczam w bibliotece</option>
            <option value="dostaję w prezencie">dostaję w prezencie</option>
            <option value="pożyczam od kolegów">pożyczam od kolegów</option>
        </select><br>
        <input type="submit" value="Wyślij dane">
        <input type="reset" value="Wyczyść">
    </form>
</body>
</html>
