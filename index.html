// funkcja: zamiana nazwy pliku na ładny tytuł
function getNameFromUrl(url) {
    let name = url.split("/").pop().replace(".html", "");

    // index.html → Strona
    if (name === "index") return "Strona";

    // usuń datę (20260306_)
    if (/^\d{8}_/.test(name)) {
        name = name.substring(9);
    }

    // zamień myślniki na spacje
    name = name.replace(/-/g, " ");

    // rozdziel liczby (historia7 → historia 7)
    name = name.replace(/([a-zA-Ząćęłńóśżź])(\d+)/g, "$1 $2");

    // 🔥 TWOJA LISTA WYJĄTKÓW (MOŻESZ DOPISYWAĆ)
    const customWords = {
        "zabka": "Żabka",
        "milosnik": "Miłośnik",
        "baltycka": "Bałtycka", 
        "gor": "Gór",
        "wieze": "Wieże", 
        "ksiazeczki": "Książeczki",
        "slask": "Śląsk",
        "klodzkiej": "Kłodzkiej",
        "beskidow": "Beskidów",
        "dlugopole": "Długopole",
        "male": "Małe",
        "zdroj": "Zdrój",
        "wroclawia": "Wrocławia",
        "slezy": "Ślęży",
        "snieznika": "Śnieżnika",
        "wzgorza": "Wzgórza",
        "pogorzy": "Pogórzy",
        "zamkow": "Zamków",
        "miedzygorza": "Międzygórza",
        "sudetow": "Sudetów",
        "zlotych": "Złotych",
        "swietokrzyskich": "Świętokrzyskich",
        "piatka": "Piątka",
        "wyzyny": "Wyżyny", 
        "wedkarstwo": "Wędkarstwo",
        "banki": "Bańki",
        "jablko": "Jabłko",
        "walbrzyskiej": "Wałbrzyskiej",
        "latarn": "Latarń",
        "widokow": "Widoków",
        "rychlebow": "Rychlebów",
        "gorek": "Górek",
        "bieszczadow": "Bieszczadów",
        "kzkg": "KZKG",
        "slaska": "Śląska",
        "bylem": "Byłem",
        "wyjasnienie": "Wyjaśnienie",
        "stolowych": "Stołowych"
    };

    // podziel na słowa
    let words = name.split(" ");

    words = words.map(word => {
        let lower = word.toLowerCase();

        // jeśli jest w wyjątkach → użyj gotowego
        if (customWords[lower]) {
            return customWords[lower];
        }

        // normalnie: DUŻA pierwsza litera
        return lower.charAt(0).toUpperCase() + lower.slice(1);
    });

    return words.join(" ");
}
