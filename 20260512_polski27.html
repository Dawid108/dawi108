<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Podsumowanie Aktu I Wesela</title>
<script src="script.js"></script>
<link rel="icon" href="dawi108.png" type="image/png">
<link rel="stylesheet" href="20260323_style.css">
</head>
<body>

<div id="game">
    <div id="stats">
        <div>Życia: <span id="life">9</span></div>
        <div>Punkty: <span id="score">0</span></div>
    </div>
    <div class="category" id="category"></div>
    <div class="question" id="question"></div>
    <div id="answers"></div>
    <div id="counter"></div>
</div>

<div id="endScreen" class="hidden">
    <h2 id="endTitle"></h2>
    <p>Twój wynik: <span id="finalScore"></span></p>
    <p>Twój rekord: <span id="record"></span></p>
    <p>Suma punktów: <span id="dawid108"></span></p>
    <button onclick="newGame()">Nowa Gra</button>
</div>

<script>
// PYTANIA
let questions = [
  {cat:"Podsumowanie Aktu I Wesela", q:"Co Wyspiański ukazuje poprzez wzajemne antagonizmy w akcie I?", a:"Przeciwieństwo i wrogość między chłopami a inteligentami", b:"Solidarność i pełne zrozumienie wszystkich gości weselnych", c:"Radość z odzyskania wolności przez połączone siły polskie", d:"Obawy przed nadchodzącą wojną z sąsiednimi mocarstwami"},
  {cat:"Podsumowanie Aktu I Wesela", q:"Jakie są główne przyczyny podziału między grupami społecznymi?", a:"Sposób życia, mentalność, emocjonalność oraz historia", b:"Różnice w wierze religijnej oraz odmienne poglądy polityczne", c:"Miejsce zamieszkania i brak wspólnego języka do rozmowy", d:"Status majątkowy oraz dostęp do wykształcenia medycznego"},
  {cat:"Podsumowanie Aktu I Wesela", q:"Czym charakteryzuje się inteligencja przedstawiona w dramacie?", a:"Żyją marzeniami i są zafascynowani wsią tylko powierzchownie", b:"Są twardo stąpającymi po ziemi realistami dbającymi o kraj", c:"Skupiają się na edukowaniu chłopów i poprawie ich bytu", d:"Dążą do wywołania powstania zbrojnego za wszelką cenę"},
  {cat:"Podsumowanie Aktu I Wesela", q:"Jak w Twojej notatce opisani są chłopi?", a:"Są patriotami z duchem walki, ale bywają nadpobudliwi", b:"Są spokojnymi obserwatorami, którzy nie chcą żadnych zmian", c:"Są ludźmi bez honoru, którzy boją się walczyć o ojczyznę", d:"Są wyłącznie leniwymi pracownikami, którzy unikają wysiłku"},
  {cat:"Podsumowanie Aktu I Wesela", q:"Jaki jest tragiczny skutek braku porozumienia między grupami?", a:"Polska nadal pozostaje pod zaborami przez brak jedności", b:"Gospodarz decyduje się na wygnanie wszystkich gości z domu", c:"Wybucha kolejna krwawa rabacja na terenie całych Bronowic", d:"Wszyscy goście postanawiają emigrować na stałe za granicę"},
  {cat:"Podsumowanie Aktu I Wesela", q:"Czym jest zjawisko chłopomanii (ludomanii)?", a:"Fascynacją folklorem bez wnikania w prawdziwe problemy wsi", b:"Ruchami społecznymi dążącymi do uwłaszczenia wszystkich chłopów", c:"Przymusowym osiedlaniem się inteligencji na terenach wiejskich", d:"Nienawiścią do wszystkiego, co jest związane z życiem wiejskim"},
  {cat:"Podsumowanie Aktu I Wesela", q:"Skąd bierze się określenie „Jak się wszystko dziwnie plecie”?", a:"Z powierzchownej fascynacji wsią i braku realnego porozumienia", b:"Z radości z powodu udanego wesela Lucjana Rydla w Bronowicach", c:"Z opisu skomplikowanych strojów ludowych noszonych przez gości", d:"Z techniki literackiej, którą Wyspiański zastosował w dramacie"}
];


let current = 0;
let life = 9;
let score = 0;
let used = [];
let maxQ = questions.length;
let record = localStorage.getItem("szkola") || 0;
let dawid108 = localStorage.getItem("dawid108") || 0;

function newGame(){
    life = 9; score = 0; used = [];
    document.getElementById("endScreen").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");
    updateStats();
    nextQuestion();
}

function updateStats(){
    document.getElementById("life").innerText = life;
    document.getElementById("score").innerText = score;
}

function nextQuestion(){
    if(used.length === maxQ){ return win(); }

    let id;
    do{ id = Math.floor(Math.random()*maxQ); }
    while(used.includes(id));

    used.push(id);
    current = questions[id];

    document.getElementById("category").innerText = current.cat;
    document.getElementById("question").innerText = current.q;
    document.getElementById("counter").innerText = "Pytanie " + used.length + " / " + maxQ;

    let arr = [
        {txt: current.a, correct: true},
        {txt: current.b, correct: false},
        {txt: current.c, correct: false},
        {txt: current.d, correct: false}
    ];
    arr.sort(()=>Math.random()-0.5);

    let ansDiv = document.getElementById("answers");
    ansDiv.innerHTML = "";

    arr.forEach(a=>{
        let btn = document.createElement("div");
        btn.classList.add("btn");
        btn.innerText = a.txt;
        btn.onclick = ()=>answer(a.correct, btn);
        ansDiv.appendChild(btn);
    });
}

function answer(correct, btn){
    let buttons = document.querySelectorAll(".btn");
    buttons.forEach(b=>b.style.pointerEvents="none");

    if(correct){
        btn.classList.add("correct");
        score++;
        // Zwiększamy ogólną pulę punktów Dawida
        dawid108 = parseInt(dawid108) + 1;
        localStorage.setItem("dawid108", dawid108);
        updateStats();
        setTimeout(()=>nextQuestion(), 1500);
    }else{
        btn.classList.add("wrong");
        buttons.forEach(b=>{
            if(b.innerText === current.a) b.classList.add("correct");
        });
        life--;
        updateStats();
        if(life <= 0){ setTimeout(()=>gameOver(), 3000); }
        else{ setTimeout(()=>nextQuestion(), 4000); }
    }
}

function win(){
    document.getElementById("game").classList.add("hidden");
    document.getElementById("endScreen").classList.remove("hidden");
    document.getElementById("endTitle").innerText = "Wygrałeś!";
    handleEnd();
}

function gameOver(){
    document.getElementById("game").classList.add("hidden");
    document.getElementById("endScreen").classList.remove("hidden");
    document.getElementById("endTitle").innerText = "Koniec gry";
    handleEnd();
}

// TA FUNKCJA ROBI PRZEKIEROWANIE DO TABELI
function handleEnd(){
    document.getElementById("finalScore").innerText = score;

    if(score > record){
        record = score;
        localStorage.setItem("szkola", record);
    }

    document.getElementById("record").innerText = record;
    document.getElementById("dawid108").innerText = dawid108;

    // Pobieramy pozostałe wyniki z pamięci, żeby ich nie wyzerować przy wysyłce
    let zabka = localStorage.getItem("zabka") || 0;
    let kosmos = localStorage.getItem("kosmos") || 0;
    let halloween = localStorage.getItem("halloween") || 0;
    let zombi = localStorage.getItem("zombi") || 0;
    let jablko = localStorage.getItem("jablko") || 0;
    let samolot = localStorage.getItem("samolot") || 0;
    let goldrun = localStorage.getItem("goldrun") || 0;
    let ufo = localStorage.getItem("ufo") || 0;

    // Przygotowanie adresu URL do Twojej tabeli
    let url = "https://dawid108.infinityfree.me/receive.html"
        + "?dawid108=" + encodeURIComponent(dawid108)
        + "&szkola=" + encodeURIComponent(record) // Wysyłamy rekord z tej gry
        + "&zabka=" + encodeURIComponent(zabka)
        + "&kosmos=" + encodeURIComponent(kosmos)
        + "&halloween=" + encodeURIComponent(halloween)
        + "&zombi=" + encodeURIComponent(zombi)
        + "&jablko=" + encodeURIComponent(jablko)
        + "&samolot=" + encodeURIComponent(samolot)
        + "&goldrun=" + encodeURIComponent(goldrun)
        + "&ufo=" + encodeURIComponent(ufo);

    // Przekierowanie po 3 sekundach, żeby użytkownik zdążył zobaczyć swój wynik końcowy
    setTimeout(() => {
        window.location.href = url;
    }, 3000);
}

newGame();
</script>

</body>
</html>
