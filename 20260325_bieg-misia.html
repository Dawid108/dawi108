<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Road to 38:59 - Bieg Misia</title>
    <script src="script.js"></script>
    <link rel="icon" href="dawi108.png">
    <style>
        :root {
            --primary: #2ecc71;
            --secondary: #3498db;
            --dark: #2c3e50;
            --light: #ecf0f1;
            --accent: #e74c3c;
            --gold: #f1c40f;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 15px;
            color: var(--dark);
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 30px 15px;
            background: linear-gradient(135deg, var(--dark) 0%, #34495e 100%);
            color: white;
            border-radius: 20px;
            margin-bottom: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        header h1 { margin: 0; font-size: 2rem; letter-spacing: 1px; }
        header p { opacity: 0.9; margin: 10px 0 0; }
        .goal-badge {
            display: inline-block;
            background: var(--primary);
            padding: 5px 15px;
            border-radius: 50px;
            font-weight: bold;
            margin-top: 10px;
        }

        .section-title {
            font-size: 1.4rem;
            margin: 30px 0 15px;
            padding-left: 15px;
            border-left: 5px solid var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 8px solid #ddd;
            transition: all 0.3s ease;
        }

        .card.today {
            border-left-color: var(--primary);
            background: #fafffa;
            transform: translateY(-5px);
            box-shadow: 0 12px 20px rgba(46, 204, 113, 0.15);
            border: 2px solid var(--primary);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 12px;
        }

        .date-box { text-align: left; }
        .date { font-size: 1.1rem; font-weight: bold; color: var(--dark); }
        .day-name { font-size: 0.85rem; color: #7f8c8d; text-transform: uppercase; }

        .activity-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 8px;
        }

        .details {
            font-size: 0.95rem;
            color: #444;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
        }

        .tag {
            font-size: 0.75rem;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 4px;
            text-transform: uppercase;
            color: white;
        }

        .type-run { border-left-color: var(--secondary); }
        .tag-run { background: var(--secondary); }

        .type-ball { border-left-color: #f39c12; }
        .tag-ball { background: #f39c12; }

        .type-match { border-left-color: var(--accent); }
        .tag-match { background: var(--accent); }

        .type-rest { border-left-color: #95a5a6; }
        .tag-rest { background: #95a5a6; }

        .type-gory { border-left-color: #8e44ad; }
        .tag-gory { background: #8e44ad; }

        .type-target { border-left-color: var(--gold); }
        .tag-target { background: var(--gold); color: black; }

        @media (max-width: 600px) {
            header h1 { font-size: 1.5rem; }
            .card { padding: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>

    <div id="today-section">
        <div class="section-title">DZISIAJ</div>
        <div id="today-container"></div>
    </div>

    <div class="section-title">PLAN TRENINGOWY</div>
    <div id="full-schedule"></div>
</div>

        { d: "2026-05-09", t: "match", a: "Parkrun (23:00) + MECZ", i: "Parkrun bardzo luźno! Mecz: Zawisza Sośnie. Oszczędzaj nogi!" },
        { d: "2026-05-10", t: "target", a: "START: BIEG MISIA (10 KM)", i: "Cel: 38:59. Ruszaj po życiówkę! It's your time!" }
    ];

    function getDayName(dateStr) {
        return new Date(dateStr).toLocaleDateString('pl-PL', { weekday: 'long' });
    }

    function createCard(item) {
        const todayStr = new Date().toISOString().split('T')[0];
        const isToday = item.d === todayStr;
        const typeLabels = {
            run: "Bieganie", ball: "Piłka", match: "MECZ", rest: "Rest", gory: "Góry", target: "START"
        };

        return `
            <div class="card type-${item.t} ${isToday ? 'today' : ''}">
                <div class="card-header">
                    <div class="date-box">
                        <div class="date">${item.d}</div>
                        <div class="day-name">${getDayName(item.d)}</div>
                    </div>
                    <span class="tag tag-${item.t}">${typeLabels[item.t]}</span>
                </div>
                <div class="activity-title">${item.a}</div>
                <div class="details">${item.i}</div>
            </div>
        `;
    }

    function init() {
        const todayStr = new Date().toISOString().split('T')[0];
        const todayCont = document.getElementById('today-container');
        const fullCont = document.getElementById('full-schedule');

        let foundToday = false;

        trainingPlan.forEach(item => {
            const cardHtml = createCard(item);
            
            if (item.d === todayStr) {
                todayCont.innerHTML = cardHtml;
                foundToday = true;
            }
            
            if (item.d >= todayStr) {
                fullCont.innerHTML += cardHtml;
            }
        });

        if (!foundToday) {
            todayCont.innerHTML = "<div class='card'>Dzisiaj odpoczywamy! Sprawdź plan na kolejne dni.</div>";
        }
    }

    init();
</script>

</body>
</html>
