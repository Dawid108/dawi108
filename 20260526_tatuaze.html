<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Tatuaże</title>
    <script src="script.js"></script>
    <style>
@font-face {
    font-family: 'Dancing Script';
    src: url('20260526_DancingScript-Regular.woff2') format('woff2'),
        url('20260526_DancingScript-Regular.woff') format('woff');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
}
body{
    font-family: Dancing Script, serif;
    font-size: 120%;
    text-align: center;
}
#n1, aside{
    background-color: rosybrown;
    width: 30%;
    float: left;
}
aside{
    text-align: left;
    height: 350px;
}
#n2{
    background-color: rosybrown;
    width: 70%;
    height: 100px;
    float: left;
}
section{
    width: 70%;
    height: 550px;
    overflow: visible;
    float: right;
}
label{
    line-height: 50px;
}
.miniatury{
    width: 150px;
}
.miniatury:hover{
    background-color: bisque;
    width: 200px;
    transition: 1s;
}
    </style>
</head>
<body>
    <header id="n1">
        <img src="https://res.cloudinary.com/diljpkw9f/image/upload/v1779826944/logo_yqfmjf.png" alt="salon">
    </header>
    <header id="n2">
        <h1>Studio Tatuażu</h1>
    </header>
    <section id="galeria">
        <h2>Galeria</h2>
        <img src="https://res.cloudinary.com/diljpkw9f/image/upload/v1779826944/smok_lakir4.png" alt="smok.png" class="miniatury">
        <img src="https://res.cloudinary.com/diljpkw9f/image/upload/v1779826944/koliber_fwbkoi.png" alt="koliber.png" class="miniatury">
    </section>
    <aside>
        <h3>Dodaj wzór</h3><br>
        <label for="wzor">Wzór:</label><br>
        <input type="file" id="wzor"><br>
        <label for="lista">Kolor:</label><br>
        <select id="lista">
            <option value="Czarny">Czarny</option>
            <option value="Czerwony">Czerwony</option>
            <option value="Zielony">Zielony</option>
            <option value="Niebieski">Niebieski</option>
        </select><br>
        <label for="cena">Cena:</label><br>
        <input type="number" id="cena"><br>
        <input type="button" value="Dodaj Wzór" id="dodaj">
    </aside>
    <footer>Autor strony: Dawid Gustowski</footer>
    <script>
        let dodaj = document.getElementById('dodaj');
        
        const linki = [
            "https://res.cloudinary.com/diljpkw9f/image/upload/v1779826944/koliber_fwbkoi.png",
            "https://res.cloudinary.com/diljpkw9f/image/upload/v1779826944/smok_lakir4.png",
            "https://res.cloudinary.com/diljpkw9f/image/upload/v1779827371/waz_q2dzih.png",
            "https://res.cloudinary.com/diljpkw9f/image/upload/v1779827371/delfin_gbnona.png",
            "https://res.cloudinary.com/diljpkw9f/image/upload/v1779827371/kwiat_sx9ddy.png",
            "https://res.cloudinary.com/diljpkw9f/image/upload/v1779827371/angel_nz33w2.png",
            "https://res.cloudinary.com/diljpkw9f/image/upload/v1779827371/tygrys_ljeiku.png",
            "https://res.cloudinary.com/diljpkw9f/image/upload/v1779827372/kwiaty_w98yae.png",
            "https://res.cloudinary.com/diljpkw9f/image/upload/v1779827372/celtic_oari9r.png",
            "https://res.cloudinary.com/diljpkw9f/image/upload/v1779827372/rozeta_bsmxz1.png"
        ];
        
        function komunikat(){
            let lista = document.getElementById('lista');
            let cena = document.getElementById('cena');
            let galeria = document.getElementById('galeria');
            
            let index = Math.floor(Math.random() * linki.length);
            let plik = linki[index];
            
            let nazwaPliku = plik.substring(plik.lastIndexOf('/') + 1);
            alert("Wzór: " + nazwaPliku + ", kolor " + lista.value + " w cenie " + cena.value + " zł");
        
            let obraz = document.createElement('img');
            obraz.src = plik;
            obraz.alt = nazwaPliku;
            obraz.className = "miniatury";
        
            galeria.appendChild(obraz);
        }
        
        dodaj.addEventListener("click", komunikat);
    </script>
</body>
</html>
