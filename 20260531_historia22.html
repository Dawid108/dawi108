<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZSRR - Imperium Komunistyczne</title>
<script src="script.js"></script>
<link rel="icon" href="dawi108.png" type="image/png">
<link rel="stylesheet" href="20260323_style.css">
</head>
<body>

<div id="game">
    <div id="stats">
        <div>Życia: <span id="life">9</span></div>
        <div>Punkty: <span id="score">0</span></div>
    </div>
    <div class="category" id="category"></div>
    <div class="question" id="question"></div>
    <div id="answers"></div>
    <div id="counter"></div>
</div>

<div id="endScreen" class="hidden">
    <h2 id="endTitle"></h2>
    <p>Twój wynik: <span id="finalScore"></span></p>
    <p>Twój rekord: <span id="record"></span></p>
    <p>Suma punktów: <span id="dawid108"></span></p>
    <button onclick="newGame()">Nowa Gra</button>
</div>

<script>
// PYTANIA
let questions = [
    {cat:"ZSRR - Imperium Komunistyczne", q:"W którym miesiącu 1922 roku Rosja Sowiecka została przekształcona w ZSRS?", a:"W grudniu 1922 roku", b:"W marcu 1922 roku", c:"We wrześniu 1922 roku", d:"W czerwcu 1922 roku"},

{cat:"ZSRR - Imperium Komunistyczne", q:"W co została przekształcona Rosja Sowiecka w 1922 roku?", a:"W Związek Socjalistycznych Republik Sowieckich", b:"W Federację Republik Demokratycznych", c:"W Zjednoczone Państwo Robotnicze Europy", d:"W Konfederację Republik Ludowych"},

{cat:"ZSRR - Imperium Komunistyczne", q:"Kto przejął władzę w ZSRS w 1924 roku?", a:"Józef Stalin", b:"Włodzimierz Lenin", c:"Lew Trocki", d:"Mikołaj Bucharin"},

{cat:"ZSRR - Imperium Komunistyczne", q:"W jakich latach Sowieci prowadzili gospodarkę na zasadach komunizmu wojennego?", a:"W latach 1917–1920", b:"W latach 1921–1924", c:"W latach 1928–1932", d:"W latach 1914–1918"},

{cat:"ZSRR - Imperium Komunistyczne", q:"Co stało się z przemysłem podczas komunizmu wojennego?", a:"Został znacjonalizowany", b:"Został całkowicie sprywatyzowany", c:"Został oddany samorządom", d:"Został przekazany zagranicy"},

{cat:"ZSRR - Imperium Komunistyczne", q:"Co stało się z handlem podczas komunizmu wojennego?", a:"Został znacjonalizowany", b:"Został całkowicie uwolniony", c:"Został sprzedany prywatnym firmom", d:"Został przekazany chłopom"},

{cat:"ZSRR - Imperium Komunistyczne", q:"Co narzucono chłopom w okresie komunizmu wojennego?", a:"Przymusowe dostawy żywności", b:"Obowiązkową służbę wojskową", c:"Zakaz uprawy własnej ziemi", d:"Nakaz pracy w fabrykach"},

{cat:"ZSRR - Imperium Komunistyczne", q:"W jakich latach obowiązywała Nowa Polityka Ekonomiczna?", a:"W latach 1921–1928", b:"W latach 1917–1920", c:"W latach 1928–1935", d:"W latach 1930–1938"},

{cat:"ZSRR - Imperium Komunistyczne", q:"Jak nazywała się polityka gospodarcza wprowadzona po komunizmie wojennym?", a:"Nowa Polityka Ekonomiczna (NEP)", b:"Program Wielkiej Industrializacji", c:"Polityka Gospodarki Narodowej", d:"Plan Odbudowy Państwowej"},

{cat:"ZSRR - Imperium Komunistyczne", q:"Jaki skutek przyniosło wprowadzenie NEP?", a:"Liberalizację i poprawę sytuacji", b:"Upadek handlu i produkcji", c:"Likwidację prywatnych gospodarstw", d:"Zwiększenie represji gospodarczych"},

{cat:"ZSRR - Imperium Komunistyczne", q:"Co wprowadził Stalin od 1928 roku?", a:"Gospodarkę planową", b:"Wolny rynek gospodarczy", c:"System gospodarki kolonialnej", d:"Model gospodarki prywatnej"},

{cat:"ZSRR - Imperium Komunistyczne", q:"Jaki sektor gospodarki rozwijał Stalin?", a:"Przemysł ciężki", b:"Turystykę międzynarodową", c:"Przemysł rozrywkowy", d:"Handel detaliczny"},

{cat:"ZSRR - Imperium Komunistyczne", q:"Jakie działania prowadzono wobec rywali politycznych Stalina?", a:"Czystki i masowe mordy", b:"Rozmowy pojednawcze i reformy", c:"Wolne wybory i konsultacje", d:"Programy edukacyjne i szkolenia"},

{cat:"ZSRR - Imperium Komunistyczne", q:"Jakie zjawisko rozwinęło się wokół osoby Stalina?", a:"Kult jednostki", b:"Kult demokracji", c:"Kult wolnego rynku", d:"Kult monarchii"},

{cat:"ZSRR - Imperium Komunistyczne", q:"Jaką politykę wobec społeczeństwa prowadziły władze stalinowskie?", a:"Politykę terroru", b:"Politykę pełnej swobody", c:"Politykę decentralizacji", d:"Politykę neutralności"},

{cat:"ZSRR - Imperium Komunistyczne", q:"Jakie metody stosowały władze stalinowskie wobec obywateli?", a:"Masowe represje", b:"Dobrowolne przesiedlenia", c:"Programy integracyjne", d:"Powszechne konsultacje"},

{cat:"ZSRR - Imperium Komunistyczne", q:"Co robiono z setkami tysięcy ludzi podczas represji?", a:"Mordowano ich lub zsyłano do gułagów", b:"Przyznawano im stanowiska urzędnicze", c:"Wysyłano ich na studia zagraniczne", d:"Przenoszono ich do nowych miast"},

{cat:"ZSRR - Imperium Komunistyczne", q:"Gdzie zsyłano wielu przeciwników i obywateli ZSRS?", a:"Do gułagów", b:"Do kolonii zamorskich", c:"Do państw zachodnich", d:"Do ośrodków wypoczynkowych"},

{cat:"ZSRR - Imperium Komunistyczne", q:"W jakich latach miał miejsce wielki głód na Ukrainie?", a:"W latach 1932–1933", b:"W latach 1920–1921", c:"W latach 1938–1939", d:"W latach 1941–1942"},

{cat:"ZSRR - Imperium Komunistyczne", q:"Ile osób zmarło podczas głodu na Ukrainie?", a:"Około 8 milionów osób", b:"Około 800 tysięcy osób", c:"Około 2 milionów osób", d:"Około 15 milionów osób"},

{cat:"ZSRR - Imperium Komunistyczne", q:"Jaki był charakter głodu na Ukrainie według notatki?", a:"Był celowo wywołany", b:"Był skutkiem powodzi", c:"Był wynikiem suszy naturalnej", d:"Był następstwem epidemii"},

{cat:"ZSRR - Imperium Komunistyczne", q:"Jaki traktat zawarli Sowieci i Niemcy w 1922 roku?", a:"Traktat w Rapallo", b:"Traktat wersalski", c:"Traktat brzeski", d:"Traktat ryski"},

{cat:"ZSRR - Imperium Komunistyczne", q:"Jaką współpracę podjęli Sowieci i Niemcy po traktacie w Rapallo?", a:"Militarną i gospodarczą", b:"Wyłącznie kulturalną i naukową", c:"Religijną i edukacyjną", d:"Sportową i turystyczną"}
];


let current = 0;
let life = 9;
let score = 0;
let used = [];
let maxQ = questions.length;
let record = localStorage.getItem("szkola") || 0;
let dawid108 = localStorage.getItem("dawid108") || 0;

function newGame(){
    life = 9; score = 0; used = [];
    document.getElementById("endScreen").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");
    updateStats();
    nextQuestion();
}

function updateStats(){
    document.getElementById("life").innerText = life;
    document.getElementById("score").innerText = score;
}

function nextQuestion(){
    if(used.length === maxQ){ return win(); }

    let id;
    do{ id = Math.floor(Math.random()*maxQ); }
    while(used.includes(id));

    used.push(id);
    current = questions[id];

    document.getElementById("category").innerText = current.cat;
    document.getElementById("question").innerText = current.q;
    document.getElementById("counter").innerText = "Pytanie " + used.length + " / " + maxQ;

    let arr = [
        {txt: current.a, correct: true},
        {txt: current.b, correct: false},
        {txt: current.c, correct: false},
        {txt: current.d, correct: false}
    ];
    arr.sort(()=>Math.random()-0.5);

    let ansDiv = document.getElementById("answers");
    ansDiv.innerHTML = "";

    arr.forEach(a=>{
        let btn = document.createElement("div");
        btn.classList.add("btn");
        btn.innerText = a.txt;
        btn.onclick = ()=>answer(a.correct, btn);
        ansDiv.appendChild(btn);
    });
}

function answer(correct, btn){
    let buttons = document.querySelectorAll(".btn");
    buttons.forEach(b=>b.style.pointerEvents="none");

    if(correct){
        btn.classList.add("correct");
        score++;
        // Zwiększamy ogólną pulę punktów Dawida
        dawid108 = parseInt(dawid108) + 4;
        localStorage.setItem("dawid108", dawid108);
        updateStats();
        setTimeout(()=>nextQuestion(), 1500);
    }else{
        btn.classList.add("wrong");
        buttons.forEach(b=>{
            if(b.innerText === current.a) b.classList.add("correct");
        });
        life--;
        updateStats();
        if(life <= 0){ setTimeout(()=>gameOver(), 3000); }
        else{ setTimeout(()=>nextQuestion(), 4000); }
    }
}

function win(){
    document.getElementById("game").classList.add("hidden");
    document.getElementById("endScreen").classList.remove("hidden");
    document.getElementById("endTitle").innerText = "Wygrałeś!";
    handleEnd();
}

function gameOver(){
    document.getElementById("game").classList.add("hidden");
    document.getElementById("endScreen").classList.remove("hidden");
    document.getElementById("endTitle").innerText = "Koniec gry";
    handleEnd();
}

// TA FUNKCJA ROBI PRZEKIEROWANIE DO TABELI
function handleEnd(){
    document.getElementById("finalScore").innerText = score;

    if(score > record){
        record = score;
        localStorage.setItem("szkola", record);
    }

    document.getElementById("record").innerText = record;
    document.getElementById("dawid108").innerText = dawid108;

    // Pobieramy pozostałe wyniki z pamięci, żeby ich nie wyzerować przy wysyłce
    let zabka = localStorage.getItem("zabka") || 0;
    let kosmos = localStorage.getItem("kosmos") || 0;
    let halloween = localStorage.getItem("halloween") || 0;
    let zombi = localStorage.getItem("zombi") || 0;
    let jablko = localStorage.getItem("jablko") || 0;
    let samolot = localStorage.getItem("samolot") || 0;
    let goldrun = localStorage.getItem("goldrun") || 0;
    let ufo = localStorage.getItem("ufo") || 0;

    // Przygotowanie adresu URL do Twojej tabeli
    let url = "https://dawid108.infinityfree.me/receive.html"
        + "?dawid108=" + encodeURIComponent(dawid108)
        + "&szkola=" + encodeURIComponent(record) // Wysyłamy rekord z tej gry
        + "&zabka=" + encodeURIComponent(zabka)
        + "&kosmos=" + encodeURIComponent(kosmos)
        + "&halloween=" + encodeURIComponent(halloween)
        + "&zombi=" + encodeURIComponent(zombi)
        + "&jablko=" + encodeURIComponent(jablko)
        + "&samolot=" + encodeURIComponent(samolot)
        + "&goldrun=" + encodeURIComponent(goldrun)
        + "&ufo=" + encodeURIComponent(ufo);

    // Przekierowanie po 3 sekundach, żeby użytkownik zdążył zobaczyć swój wynik końcowy
    setTimeout(() => {
        window.location.href = url;
    }, 3000);
}

newGame();
</script>

</body>
</html>
