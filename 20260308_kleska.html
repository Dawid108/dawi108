<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klęska Państw Centralnych</title>
<script src="script.js"></script>
<link rel="icon" href="dawi108.png" type="image/png">
<style>
body{
background:#0d102b;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}
#game, #endScreen{
width:90%; max-width:500px;
background:#13173d;
padding:20px;
border-radius:20px;
text-align:center;
box-shadow:0 0 20px #0006;
}
.category{font-size:18px;margin-bottom:10px;color:#7dd7ff;}
.question{font-size:20px;margin-bottom:20px;}
.btn{background:#1c2257;padding:12px;border-radius:10px;margin:10px 0;cursor:pointer;transition:.2s;}
.btn:hover{background:#27307a;}
.correct{background:#1fa84f !important;}
.wrong{background:#c62828 !important;}
#stats{display:flex;justify-content:space-between;margin-bottom:20px;color:#9bbcff;}
#counter{margin-top:10px;color:#9bbcff;}
.hidden{display:none;}
#endScreen button{margin-top:15px;background:#6f85ff;padding:10px 20px;border:none;border-radius:10px;color:white;font-size:18px;cursor:pointer;}
</style>
</head>
<body>

<div id="game">
    <div id="stats">
        <div>Życia: <span id="life">9</span></div>
        <div>Punkty: <span id="score">0</span></div>
    </div>
    <div class="category" id="category"></div>
    <div class="question" id="question"></div>
    <div id="answers"></div>
    <div id="counter"></div>
</div>

<div id="endScreen" class="hidden">
    <h2 id="endTitle"></h2>
    <p>Twój wynik: <span id="finalScore"></span></p>
    <p>Twój rekord: <span id="record"></span></p>
    <p>Suma punktów: <span id="dawid108"></span></p>
    <button onclick="newGame()">Nowa Gra</button>
</div>

<script>
// PYTANIA
let questions = [

{cat:"Klęska Państw Centralnych", q:"W którym miesiącu 1915 roku Niemcy ogłosiły nieograniczoną wojnę podwodną?", a:"W lutym 1915 roku", b:"W maju 1915 roku", c:"W sierpniu 1915 roku", d:"W listopadzie 1915 roku"},

{cat:"Klęska Państw Centralnych", q:"Jak nazywano niemieckie okręty podwodne używane podczas I wojny światowej?", a:"U-Booty", b:"Drednoty", c:"Krążowniki liniowe", d:"Pancerniki eskortowe"},

{cat:"Klęska Państw Centralnych", q:"Jakie statki oprócz wojennych zaczęły atakować niemieckie U-Booty?", a:"Statki cywilne", b:"Jedynie okręty patrolowe", c:"Wyłącznie okręty podwodne", d:"Tylko statki handlowe"},

{cat:"Klęska Państw Centralnych", q:"Jak nazywał się pasażerski statek zatopiony przez Niemców w 1915 roku?", a:"Lusitania", b:"Britannic", c:"Olympic", d:"Caledonia"},

{cat:"Klęska Państw Centralnych", q:"Do którego roku Niemcy wstrzymały ataki na statki cywilne po zatopieniu Lusitanii?", a:"Do 1917 roku", b:"Do 1916 roku", c:"Do 1918 roku", d:"Do 1919 roku"},

{cat:"Klęska Państw Centralnych", q:"W którym roku odbyła się największa bitwa morska I wojny światowej?", a:"W 1916 roku", b:"W 1914 roku", c:"W 1915 roku", d:"W 1918 roku"},

{cat:"Klęska Państw Centralnych", q:"Jak nazywała się największa bitwa morska I wojny światowej?", a:"Bitwa jutlandzka", b:"Bitwa trafalgarska", c:"Bitwa o Atlantyk", d:"Bitwa helgolandzka"},

{cat:"Klęska Państw Centralnych", q:"Jaki był wynik bitwy jutlandzkiej?", a:"Była nierozstrzygnięta", b:"Zwyciężyła Wielka Brytania", c:"Zwyciężyły Niemcy", d:"Zakończyła się kapitulacją flot"},

{cat:"Klęska Państw Centralnych", q:"W którym miesiącu 1917 roku Stany Zjednoczone przystąpiły do wojny?", a:"W kwietniu 1917 roku", b:"W styczniu 1917 roku", c:"W lipcu 1917 roku", d:"We wrześniu 1917 roku"},

{cat:"Klęska Państw Centralnych", q:"Jakie państwo przystąpiło do I wojny światowej w 1917 roku po stronie Ententy?", a:"Stany Zjednoczone", b:"Hiszpania", c:"Szwajcaria", d:"Szwecja"},

{cat:"Klęska Państw Centralnych", q:"Jak nazywała się depesza, która przyczyniła się do wejścia USA do wojny?", a:"Depesza Zimmermanna", b:"Depesza Wilsona", c:"Depesza Balfoura", d:"Depesza Clemenceau"},

{cat:"Klęska Państw Centralnych", q:"W którym miesiącu 1918 roku Rosja podpisała pokój z państwami centralnymi?", a:"W marcu 1918 roku", b:"W styczniu 1918 roku", c:"W czerwcu 1918 roku", d:"W listopadzie 1918 roku"},

{cat:"Klęska Państw Centralnych", q:"Jak nazywał się traktat pokojowy Rosji z państwami centralnymi?", a:"Pokój brzeski", b:"Pokój wersalski", c:"Pokój wiedeński", d:"Pokój praski"},

{cat:"Klęska Państw Centralnych", q:"Jaki skutek dla Niemiec miał pokój brzeski?", a:"Pozwolił przerzucić wojska na front zachodni", b:"Zmusił Niemcy do wycofania wojsk z Francji", c:"Spowodował kapitulację armii niemieckiej", d:"Doprowadził do rozejmu na froncie wschodnim"},

{cat:"Klęska Państw Centralnych", q:"Jak nazywała się bitwa, w której Niemcy ponieśli porażkę w 1918 roku we Francji?", a:"II bitwa nad Marną", b:"Bitwa pod Verdun", c:"Bitwa nad Sommą", d:"Bitwa pod Ypres"},

{cat:"Klęska Państw Centralnych", q:"Które państwo ogłosiło kapitulację 3 listopada 1918 roku?", a:"Austro-Węgry", b:"Niemcy", c:"Bułgaria", d:"Turcja"},

{cat:"Klęska Państw Centralnych", q:"Kiedy podpisano rozejm kończący walki na froncie zachodnim?", a:"11 listopada 1918 roku", b:"11 października 1918 roku", c:"11 grudnia 1918 roku", d:"11 stycznia 1919 roku"},

{cat:"Klęska Państw Centralnych", q:"W jakim miejscu podpisano rozejm kończący I wojnę światową?", a:"W Compiègne pod Paryżem", b:"W Wersalu pod Paryżem", c:"W Brukseli pod Antwerpią", d:"W Hadze pod Amsterdamem"},

{cat:"Klęska Państw Centralnych", q:"Jaki ustrój upadł w Niemczech po I wojnie światowej?", a:"Monarchia", b:"Republika federalna", c:"Dyktatura wojskowa", d:"Monarchia konstytucyjna"},

{cat:"Klęska Państw Centralnych", q:"Jakie wielkie państwo rozpadło się po I wojnie światowej w Europie Środkowej?", a:"Austro-Węgry", b:"Królestwo Włoch", c:"Imperium Brytyjskie", d:"Królestwo Hiszpanii"},

{cat:"Klęska Państw Centralnych", q:"Jakie wydarzenie polityczne miało miejsce w Rosji podczas wojny?", a:"Rewolucja w Rosji", b:"Restauracja monarchii", c:"Powstanie republiki", d:"Zjednoczenie państwa"},

{cat:"Klęska Państw Centralnych", q:"Jaki system władzy upadł w Rosji podczas I wojny światowej?", a:"Carat", b:"Republika parlamentarna", c:"Dyktatura wojskowa", d:"Monarchia elekcyjna"},

{cat:"Klęska Państw Centralnych", q:"Ilu żołnierzy zginęło około podczas I wojny światowej?", a:"Około 8,5 miliona żołnierzy", b:"Około 2 miliony żołnierzy", c:"Około 20 milionów żołnierzy", d:"Około 500 tysięcy żołnierzy"},

{cat:"Klęska Państw Centralnych", q:"Jakim stanem zakończyły się gospodarki wielu państw po wojnie?", a:"Ruina gospodarcza", b:"Pełny rozwój przemysłu", c:"Stały wzrost eksportu", d:"Nagły rozwój handlu"},

{cat:"Klęska Państw Centralnych", q:"Jakie państwo stało się potęgą globalną dzięki pożyczkom udzielanym w czasie wojny?", a:"Stany Zjednoczone", b:"Szwecja", c:"Holandia", d:"Portugalia"}

];

let current = 0;
let life = 9;
let score = 0;
let used = [];
let maxQ = questions.length;
let record = localStorage.getItem("szkola") || 0;
let dawid108 = localStorage.getItem("dawid108") || 0;

function newGame(){
    life = 9; score = 0; used = [];
    document.getElementById("endScreen").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");
    updateStats();
    nextQuestion();
}

function updateStats(){
    document.getElementById("life").innerText = life;
    document.getElementById("score").innerText = score;
}

function nextQuestion(){
    if(used.length === maxQ){ return win(); }

    let id;
    do{ id = Math.floor(Math.random()*maxQ); }
    while(used.includes(id));

    used.push(id);
    current = questions[id];

    document.getElementById("category").innerText = current.cat;
    document.getElementById("question").innerText = current.q;

    document.getElementById("counter").innerText = "Pytanie " + used.length + " / " + maxQ;

    // Mieszanie odpowiedzi
    let arr = [
        {txt: current.a, correct: true},
        {txt: current.b, correct: false},
        {txt: current.c, correct: false},
        {txt: current.d, correct: false}
    ];
    arr.sort(()=>Math.random()-0.5);

    let ansDiv = document.getElementById("answers");
    ansDiv.innerHTML = "";

    arr.forEach(a=>{
        let btn = document.createElement("div");
        btn.classList.add("btn");
        btn.innerText = a.txt;
        btn.onclick = ()=>answer(a.correct, btn);
        ansDiv.appendChild(btn);
    });
}

function answer(correct, btn){
    let buttons = document.querySelectorAll(".btn");
    buttons.forEach(b=>b.style.pointerEvents="none");

    if(correct){
        btn.classList.add("correct");
        score++;
        dawid108++;
        localStorage.setItem("dawid108", dawid108);
        console.log("dawid108:", dawid108);
        updateStats();
        setTimeout(()=>nextQuestion(), 1500);
    }else{
        btn.classList.add("wrong");
        // pokaż poprawną
        buttons.forEach(b=>{
            if(b.innerText === current.a) b.classList.add("correct");
        });
        life--;
        updateStats();
        if(life <= 0){ setTimeout(()=>gameOver(), 6000); }
        else{ setTimeout(()=>nextQuestion(), 5000); }
    }
}

function win(){
    document.getElementById("game").classList.add("hidden");
    document.getElementById("endScreen").classList.remove("hidden");
    document.getElementById("endTitle").innerText = "Wygrałeś!";
    endScreen();
}

function gameOver(){
    document.getElementById("game").classList.add("hidden");
    document.getElementById("endScreen").classList.remove("hidden");
    document.getElementById("endTitle").innerText = "Koniec gry";
    endScreen();
}

function endScreen(){
    document.getElementById("finalScore").innerText = score;

    if(score > record){
        record = score;
        localStorage.setItem("szkola", record);
    }

    document.getElementById("record").innerText = record;
    document.getElementById("dawid108").innerText = dawid108;
}

newGame();
</script>
</body>
</html>
