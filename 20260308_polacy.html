<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polacy na Frontach Wielkiej Wojny</title>
<script src="script.js"></script>
<link rel="icon" href="dawi108.png" type="image/png">
<style>
body{
background:#0d102b;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}
#game, #endScreen{
width:90%; max-width:500px;
background:#13173d;
padding:20px;
border-radius:20px;
text-align:center;
box-shadow:0 0 20px #0006;
}
.category{font-size:18px;margin-bottom:10px;color:#7dd7ff;}
.question{font-size:20px;margin-bottom:20px;}
.btn{background:#1c2257;padding:12px;border-radius:10px;margin:10px 0;cursor:pointer;transition:.2s;}
.btn:hover{background:#27307a;}
.correct{background:#1fa84f !important;}
.wrong{background:#c62828 !important;}
#stats{display:flex;justify-content:space-between;margin-bottom:20px;color:#9bbcff;}
#counter{margin-top:10px;color:#9bbcff;}
.hidden{display:none;}
#endScreen button{margin-top:15px;background:#6f85ff;padding:10px 20px;border:none;border-radius:10px;color:white;font-size:18px;cursor:pointer;}
</style>
</head>
<body>

<div id="game">
    <div id="stats">
        <div>Życia: <span id="life">9</span></div>
        <div>Punkty: <span id="score">0</span></div>
    </div>
    <div class="category" id="category"></div>
    <div class="question" id="question"></div>
    <div id="answers"></div>
    <div id="counter"></div>
</div>

<div id="endScreen" class="hidden">
    <h2 id="endTitle"></h2>
    <p>Twój wynik: <span id="finalScore"></span></p>
    <p>Twój rekord: <span id="record"></span></p>
    <p>Suma punktów: <span id="dawid108"></span></p>
    <button onclick="newGame()">Nowa Gra</button>
</div>

<script>
// PYTANIA
let questions = [

{cat:"Polacy na Frontach Wielkiej Wojny", q:"W którym roku zaczęły powstawać Legiony Polskie z inicjatywy Józefa Piłsudskiego?", a:"W 1914 roku", b:"W 1905 roku", c:"W 1920 roku", d:"W 1939 roku"},

{cat:"Polacy na Frontach Wielkiej Wojny", q:"Z inicjatywy którego przywódcy zaczęto tworzyć Legiony Polskie?", a:"Józefa Piłsudskiego", b:"Romana Dmowskiego", c:"Ignacego Paderewskiego", d:"Wincentego Witosa"},

{cat:"Polacy na Frontach Wielkiej Wojny", q:"U boku jakiego państwa początkowo walczyły Legiony Polskie?", a:"Austro-Węgier", b:"Wielkiej Brytanii", c:"Stanów Zjednoczonych", d:"Imperium Osmańskiego"},

{cat:"Polacy na Frontach Wielkiej Wojny", q:"Jak nazywała się pierwsza jednostka wojskowa utworzona przez Piłsudskiego w 1914 roku?", a:"I Kompania Kadrowa", b:"I Brygada Strzelców", c:"Pułk Warszawski", d:"Oddział Krakowski"},

{cat:"Polacy na Frontach Wielkiej Wojny", q:"Jaki był główny cel wymarszu I Kompanii Kadrowej?", a:"Wywołanie powstania przeciwko Rosji w Królestwie Polskim", b:"Obrona granic Galicji przed Niemcami", c:"Wsparcie armii francuskiej na froncie zachodnim", d:"Zdobycie portów nad Morzem Czarnym"},

{cat:"Polacy na Frontach Wielkiej Wojny", q:"Ile brygad utworzono w Legionach Polskich?", a:"Trzy brygady", b:"Dwie brygady", c:"Cztery brygady", d:"Pięć brygad"},

{cat:"Polacy na Frontach Wielkiej Wojny", q:"Na jakich państwach Piłsudski początkowo opierał plan odbudowy Polski?", a:"Na państwach centralnych", b:"Na państwach skandynawskich", c:"Na państwach Ameryki Południowej", d:"Na państwach bałkańskich"},

{cat:"Polacy na Frontach Wielkiej Wojny", q:"W którym roku nastąpiła zmiana sytuacji międzynarodowej po rewolucji w Rosji?", a:"W 1917 roku", b:"W 1914 roku", c:"W 1915 roku", d:"W 1919 roku"},

{cat:"Polacy na Frontach Wielkiej Wojny", q:"Jaki ustrój upadł w Rosji w wyniku rewolucji w 1917 roku?", a:"Carat", b:"Republika parlamentarna", c:"Monarchia konstytucyjna", d:"Dyktatura wojskowa"},

{cat:"Polacy na Frontach Wielkiej Wojny", q:"Czego zażądały państwa centralne od legionistów w 1917 roku?", a:"Złożenia przysięgi na wierność cesarzom", b:"Natychmiastowego powrotu do kraju", c:"Udziału w wojnie morskiej", d:"Oddania broni i mundurów"},

{cat:"Polacy na Frontach Wielkiej Wojny", q:"Jak nazwano wydarzenie związane z odmową złożenia przysięgi przez legionistów?", a:"Kryzys przysięgowy", b:"Powstanie legionowe", c:"Konflikt galicyjski", d:"Układ warszawski"},

{cat:"Polacy na Frontach Wielkiej Wojny", q:"Które brygady Legionów odmówiły złożenia przysięgi?", a:"I i III Brygada", b:"I i II Brygada", c:"II i III Brygada", d:"Wszystkie trzy brygady"},

{cat:"Polacy na Frontach Wielkiej Wojny", q:"Gdzie internowano część legionistów po kryzysie przysięgowym?", a:"W Szczypiornie pod Kaliszem", b:"W Krakowie pod Wawelem", c:"W Poznaniu nad Wartą", d:"W Lublinie przy zamku"},

{cat:"Polacy na Frontach Wielkiej Wojny", q:"W jakim niemieckim mieście uwięziono Józefa Piłsudskiego?", a:"W Magdeburgu", b:"W Hamburgu", c:"W Berlinie", d:"W Monachium"},

{cat:"Polacy na Frontach Wielkiej Wojny", q:"Kto dowodził II Brygadą Legionów Polskich?", a:"Józef Haller", b:"Edward Rydz-Śmigły", c:"Władysław Sikorski", d:"Józef Dowbor-Muśnicki"},

{cat:"Polacy na Frontach Wielkiej Wojny", q:"Do którego miesiąca 1918 roku II Brygada walczyła po stronie państw centralnych?", a:"Do lutego 1918 roku", b:"Do czerwca 1918 roku", c:"Do września 1918 roku", d:"Do grudnia 1918 roku"},

{cat:"Polacy na Frontach Wielkiej Wojny", q:"Gdzie oddziały Hallera przebiły się przez front w 1918 roku?", a:"Pod Rarańczą", b:"Pod Verdun", c:"Pod Tannenbergiem", d:"Pod Gallipoli"},

{cat:"Polacy na Frontach Wielkiej Wojny", q:"Jakie ugrupowanie polityczne kierowało Komitetem Narodowym Polskim?", a:"Narodowa Demokracja", b:"Polska Partia Socjalistyczna", c:"Stronnictwo Ludowe", d:"Polska Organizacja Wojskowa"},

{cat:"Polacy na Frontach Wielkiej Wojny", q:"Kto był głównym przywódcą Narodowej Demokracji w czasie wojny?", a:"Roman Dmowski", b:"Józef Piłsudski", c:"Ignacy Daszyński", d:"Wojciech Korfanty"},

{cat:"Polacy na Frontach Wielkiej Wojny", q:"U boku jakich państw Narodowa Demokracja widziała szansę na odzyskanie niepodległości?", a:"Rosji i państw Ententy", b:"Niemiec i Austro-Węgier", c:"Włoch i Hiszpanii", d:"Szwecji i Norwegii"},

{cat:"Polacy na Frontach Wielkiej Wojny", q:"Jak nazywała się polska jednostka utworzona w Rosji na początku wojny?", a:"Legion Puławski", b:"Pułk Warszawski", c:"Brygada Litewska", d:"Oddział Syberyjski"},

{cat:"Polacy na Frontach Wielkiej Wojny", q:"W jakim kraju zaczęto tworzyć Błękitną Armię?", a:"We Francji", b:"W Wielkiej Brytanii", c:"W Belgii", d:"W Holandii"},

{cat:"Polacy na Frontach Wielkiej Wojny", q:"Jak nazywano polskie wojsko tworzone we Francji od 1917 roku?", a:"Błękitną Armią", b:"Armią Nadwiślańską", c:"Legionem Zachodnim", d:"Oddziałem Atlantyckim"},

{cat:"Polacy na Frontach Wielkiej Wojny", q:"Kto został dowódcą Błękitnej Armii?", a:"Józef Haller", b:"Roman Dmowski", c:"Ignacy Paderewski", d:"Kazimierz Sosnkowski"},

{cat:"Polacy na Frontach Wielkiej Wojny", q:"Kiedy Błękitna Armia została przetransportowana do Polski?", a:"Wiosną 1919 roku", b:"Latem 1917 roku", c:"Jesienią 1916 roku", d:"Zimą 1921 roku"}

];

let current = 0;
let life = 9;
let score = 0;
let used = [];
let maxQ = questions.length;
let record = localStorage.getItem("szkola") || 0;
let dawid108 = localStorage.getItem("dawid108") || 0;

function newGame(){
    life = 9; score = 0; used = [];
    document.getElementById("endScreen").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");
    updateStats();
    nextQuestion();
}

function updateStats(){
    document.getElementById("life").innerText = life;
    document.getElementById("score").innerText = score;
}

function nextQuestion(){
    if(used.length === maxQ){ return win(); }

    let id;
    do{ id = Math.floor(Math.random()*maxQ); }
    while(used.includes(id));

    used.push(id);
    current = questions[id];

    document.getElementById("category").innerText = current.cat;
    document.getElementById("question").innerText = current.q;

    document.getElementById("counter").innerText = "Pytanie " + used.length + " / " + maxQ;

    // Mieszanie odpowiedzi
    let arr = [
        {txt: current.a, correct: true},
        {txt: current.b, correct: false},
        {txt: current.c, correct: false},
        {txt: current.d, correct: false}
    ];
    arr.sort(()=>Math.random()-0.5);

    let ansDiv = document.getElementById("answers");
    ansDiv.innerHTML = "";

    arr.forEach(a=>{
        let btn = document.createElement("div");
        btn.classList.add("btn");
        btn.innerText = a.txt;
        btn.onclick = ()=>answer(a.correct, btn);
        ansDiv.appendChild(btn);
    });
}

function answer(correct, btn){
    let buttons = document.querySelectorAll(".btn");
    buttons.forEach(b=>b.style.pointerEvents="none");

    if(correct){
        btn.classList.add("correct");
        score++;
        dawid108++;
        localStorage.setItem("dawid108", dawid108);
        console.log("dawid108:", dawid108);
        updateStats();
        setTimeout(()=>nextQuestion(), 1500);
    }else{
        btn.classList.add("wrong");
        // pokaż poprawną
        buttons.forEach(b=>{
            if(b.innerText === current.a) b.classList.add("correct");
        });
        life--;
        updateStats();
        if(life <= 0){ setTimeout(()=>gameOver(), 6000); }
        else{ setTimeout(()=>nextQuestion(), 5000); }
    }
}

function win(){
    document.getElementById("game").classList.add("hidden");
    document.getElementById("endScreen").classList.remove("hidden");
    document.getElementById("endTitle").innerText = "Wygrałeś!";
    endScreen();
}

function gameOver(){
    document.getElementById("game").classList.add("hidden");
    document.getElementById("endScreen").classList.remove("hidden");
    document.getElementById("endTitle").innerText = "Koniec gry";
    endScreen();
}

function endScreen(){
    document.getElementById("finalScore").innerText = score;

    if(score > record){
        record = score;
        localStorage.setItem("szkola", record);
    }

    document.getElementById("record").innerText = record;
    document.getElementById("dawid108").innerText = dawid108;
}

newGame();
</script>
</body>
</html>
